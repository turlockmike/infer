name: release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build binaries
        run: |
          bun build --compile --target=bun-darwin-arm64 infer.ts --outfile=infer-darwin-arm64
          bun build --compile --target=bun-darwin-x64   infer.ts --outfile=infer-darwin-x64
          bun build --compile --target=bun-linux-arm64  infer.ts --outfile=infer-linux-arm64
          bun build --compile --target=bun-linux-x64    infer.ts --outfile=infer-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: infer-*
          generate_release_notes: true
